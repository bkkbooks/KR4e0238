body:
  text: 宋布衣集卷三明宋登春撰池中雁林卧寡儔侣振褐臨清池露彩集蕙草霜華變青滋翩彼隨陽鳥唼藻戲漣漪返顧患人指回翔稻糧羈冥冥逞長羽繒繳何由施伊子敦孤性帶索終棲遲藜藿豈滿腹百年厭飢劬物嬰因住念逹生焉悵而冬夜宿郡齋空齋少物役獨夜有餘清柏子階前落梅花笛裏生豈須山櫟壽徒結畹蘭情明日鵝池上看雲還濯纓人日寄所知落莫江村裏偏憐物候新百年長作客此日愧為人薄俗存身計殘生隨世因楚蘭漸堪把采采寄情親洞庭送徐使君投劾東歸秋來為客易沾巾又向瀟湘送逐臣煙草斷雲橫楚塞夕陽落雁度江津天涯白髮無知已湖上青山有故人回首吳關空悵望何年滄海共垂綸自沙津江行舟次嶽陽送徐使君漠漠晴沙江水流搴衣同上木蘭舟白蘋風起洞庭暮碧樹雲橫楚塞秋羇客懷鄉何限泪孤臣去國不堪愁夕陽帆影臨空盡誰念天涯獨倚樓同句吳周秀才登嶽陽樓雨中望君山作久客知吳語高樓自楚歌青山浮水面白鳥沒煙蘿仙去蒼梧逺雲生天嶽多鄉關眇何許日暮洞庭波巴陵别徐使君歸荆州邸舍日暮尋江渡涼風滿白蘋歸來應寂寞臨别更情親孤劍三秋夢扁舟萬里身著書滄海上還著舊綸巾石首阻風寄懷徐刺史别後相思夢屢真秋來誰寄短書頻孤舟風雨偏愁客萬里江湘對逐臣莊舄苦吟終適越仲宣欲賦未歸秦十年零落黃金盡一夜長歌獨愴神石首江阻風雨舟中夜坐懷荆州公八月悲風生翛翛鴻雁鳴白頭多病日黃葉此山城細雨孤帆落長江獨夜情遙傳一掬淚灑向楚臣纓自公安縣夜歸鵝池莊風雨驟至有作候雁迷寒渚昏鴉集驛亭故人江上别風雨返柴荆楚些秋能賦巴歈夜懶聽蓬窗小兒女相待一燈青九月三日方别駕攜酒殽見過因懷徐荆州客淚秋能下人情老自知塞寒鴻雁早江暖鞠華遲對酒憐吳語聞歌憶楚辭明年誰更健重把紫萸枝再送俞山人遊黃岡兼訊袁郡丞昔别在何處今看白髮新無錢愁滯客多術耻謀身錦瑟悲燕士幽蘭憶楚臣相思有書札時寄草堂人聞徐使君留滯漢陽寄贈道直謫官蚤扁舟何去遲秋深縱酒後家逺寄書時悽斷秦雲色悲涼越鳥枝漢陽江樹晚搖落對相思春日尋楊山人因過賀將軍園二首空谷春將賦幽人獨可尋風香紅藥近鳥語緑蘿深一笑緣巴調三年學楚吟童扶還杖䇿隨意步華林茅屋斜臨水石闌曲拂衣松深鶴子冷花近藥苖肥老去詩猶健春來酒不違欲尋江路去竹下有柴扉曹中丞以新詩見遺雪中書此簡答凍雀飛還去空房祗欲眠高雲斷楚塞大雪滿江天竹葉春仍緑梅花寒可憐歸來曹執法時寄短長篇江村寒食白鳥忘機久青山吾道存興來從杖屨老去愛雞豚楊栁橋邉過桃華江上村童兒沽酒至風雨閉柴門寒食西郊望八嶺山作寒食孤村飰春山逺寺鐘登臨風候異祭掃嵗時同芳樹諸王墓浮雲舊楚宫天涯對衰鬢寂寞意無窮春日陪曺中丞飲城北莊晚至東湖草堂野望感賦芳草春初折遊絲晚正繁漁樵楊栁岸雞犬野棠村悵望荆門路悽迷楚客魂酬恩留寶劍還愛趙平原春日間居青山歌伐木白首賦間居鴻雁春能至梅花寒更踈繭絲從婦織菜甲教兒鋤日莫北窗下尊中幸不虛秋晚江上書懷一望家園一惘然湘雲易水共長天山中薜荔日蕭索江上芙蓉秋可憐楚些獨吟長下淚燕鴻又過記殘年黃金臺上無名字醉後還歌寶劍篇秋日登吟覽樓逺客不宜秋况登江上樓心隨胡雁沒身為楚雲留漢廣饒菰米湘清聚白鷗寒砧何處發落日動鄉愁秋日聞曹中丞東湖莊堂樓初築以詩奉贈雲霞江色晚楚客意何如金散身無纍才高世共踈開門聞鳥雀落日見樵漁玄閣還應閉白頭長著書寄嘉定徐刺史柴荆烏鵲定風葉正蕭蕭落日清江上懷人滄海遙年華隨杖屨生事寄漁樵楚客銷魂處秋來誰為招八月十四夜憶徐刺史桂華初發小堂東緑芷紅蘭别一藂翡翠屏前秋寂寞芙蓉塘外月朦朧寶書玉笈為誰隱雲錦霞箋還自封鴻雁不來秋又晚故人聞已到江東秋夜天秋鴻雁來夜寒桂華落空館復相思清飈振藂薄秋日鵝池莊與故人王惟材間酌秋水浮田葉涼風吹稻花白衣燕客醉紅樹楚人家翡翠鳴魚筍鴛鴦立釣車鵝池堪避地與爾種胡麻江陵遇同鄉王惟材末路誰相問無家我獨親他鄉今接袂童稚昔為鄰江海飄零客風塵淪落人十年俱白首笑此夢遊身雨中呈王郎黃金臺下見君顔今日蕭條入楚關一顧那知添白髮十年何事老青山鄉愁多在煙雲外客思偏生風雨間我已無家問消息開畦種藥不須還夏日攜王惟材陪曹公飲城東湖亭漠漠林塘五月寒主人長日竹皮冠酒爐茶竈從兒理菜圃瓜田引客看老去坐忘青瑣夢歸來囊貯紫金丹鵝池道者頻相訪笑索村醪苜蓿盤俠客賭擲賽劉琨家奴過孟賁千金不肯顧一劍為酬恩趙瑟停凰柱燕姬促象尊平生􅍁段馬羞入孟嘗門與王惟材夜坐話舊醉歌燕市笑顔紅十載離家似夢中聞説存亡重悽惻對君何必嘆飄蓬閉門庭梅橫似畫籬菊綴如錢閉户琴書客翻悲草木年黃金無藥物白髮滿顱顛花徑從兒掃誰來問尚玄秋日待家書不至感賦此詩澤國寒風木葉稀悲歌昨夜賦無衣自添白髮年華異用盡黃金生事微易水似憐湘月逺燕鴻還其楚雲飛魚書錦字無消息秋草間門又夕暉八月十四夜遊太暉觀呈忠教真人碧天高處是三清金作樓臺玉作城白鹿仙人秋弄笛青牛道士夜吹笙驚殘鶴夢江雲冷幻出松隂海月明欲寫隂符寄幽事山中老子有書迎同郡蓋子材寄示文稿作此簡答萬金散盡一身輕白首為儒掉臂行郢里誰傳春雪調楚山應繫薜蘿情自知未上干秦䇿肯信歸來感婦迎却笑文章憎命逹十年猶在魯諸生登嶽陽樓吳楚江山闊巴陵水國遙江流分九𣲖山勢控三苖卉服通州里蠻方翊聖朝每希常道泰飲啄老漁樵芳樹金井梧桐樹碧枝華葉芳月明移翠影風細吐清香共惜三春色誰憐九月霜閨中有少婦嵗嵗憶遼陽寄嘉定徐二刺史豪華猶六代勝事在吳門緑樹湖邉寺紅雲海上村桑麻常夜緝橘柚向秋繁拂袖還鄉日應憐松菊存贈廬嶽僧何日别東林浮杯夢澤深雲山隨去住水月即禪心鉢潤龍將見衣殘珠未沉行蹤遍五嶽留偈待知音秋日鵝池晝卧卑棲佚老日高枕物華年橘柚垂茅屋菰蒲間渚田意中人不見事外客孤眠習靜眇身世長吟秋水篇八月十三夜江月滿江城客愁何處生殘蛩依砌響新雁與雲平露重楸梧白天寒松桂清弟兄在萬里此夕各含情江夏舟中值元日乘舲下吳會寒日水增波江路魚蝦美山城橘柚多維舟燕客醉倚棹楚童歌明發漢陽去相思奈若何經彭澤縣舟次小孤山阻雨山塞分吳楚山城辨土風人煙澤國異春色故鄉同曉飯孤山下輕帆細雨中檣烏飛自去詩罷意無窮蕪湖沙洲阻淺草樹山頭驛雲霞江口村葦人驚虎迹舟子記潮痕欲買吳姬酒能招楚客魂長波浩無際目極更何言春日寓徐公西園笋出過闌見桃香度水聞樹深連海色洞午散江雲石上拋書卷花間數鶴羣春愁如碧草隨處亂紛紛海上寒食風雨臨寒食偏驚流浪情梅花鄉信逺芳草客愁生青眼故人少白頭世事輕還餘一尊酒東海弔田橫蘇臺覽古吳王昔日好吳鈎義士三千盡列侯霸業巳隨雲北散雄圖空復水東流荒臺寂寂漁樵路故壘蕭蕭草樹秋惟有館娃宫裏曲至今歌向采菱舟夜泊長橋落日長橋外維舟竹嶼孤春潮不滿岸江鳥下平蕪負笈終歸楚尋山且在吳自傷漂泊意深夜醉呼盧春日飲唐山人竹園蝴蝶滿園春日晴桃花梨花飛素馨千竿萬竿何菁菁時時風雨聞秋聲淇園闊節不足數渭川緑玉難為稱爾莫斸為化龍杖虛勞萬里升天行爾莫截竹學鳯笙拘牽衆樂相和鳴飾金綴玉非本性不如抱籜全爾精高陽徒籜冠生引觴大嚼無俗情其如晉代竹林彥枕麯眠糟損性靈却怪王猷多傲世入門先問主人名雪後石徑留氷雪松門鎖薜蘿地幽身自得機息鳥常過芳草春愁少梅花客醉多竹枝辭更好還愛楚人歌賞雪侍宴應教狐白暖蒙茸當歌集上公春藏金屋裏仙隱玉壺中送酒青樓妓焚香白玉童錦屏寒不入只許隔簾攏楚中送僧還嵋山隱居半偈曾聞法虛空無住心楚雲飛錫去巴水渡杯深一室寄何處千峰獨可尋有身緣未了此别日長吟送洪都道士霞外尋真侣山中問赤松仙壇花雨淨石鼎緑苔封坐煉金光草行持九節笻聞師還舊隱何日得相從送王生西遊雪裏荆門道愁中漢水春三湘曾滯客萬里欲歸身獻賦還過楚談兵莫入秦自傷流浪久偏惜逺遊人春辭二首南浦誰家薦緑蘋野棠又發楚山春滿城芳草煙和雨江燕飛來似識人廣陌青樓楊栁新鶯花時節可憐人至今漢上多遊女笑折踈麻贈所親春隂竹裏松間石徑斜春雲長繞野人家幽窗睡覺鳥聲響童子開關掃落花江陵送王惟材還趙郡湘臯煙草洞庭雲此地逢君又送君趙瑟悲涼那可問楚歌悽斷不堪聞遙山對酒春將暮臨水扳花日未曛憔悴形容獨歸去江樓細雨歎離羣踏青楊栁洲驊騮蹀躞上芳洲楊栁青青楚水流日暮東風搖百草不知何處是昭丘遼府贈楊山人故鄉因别久逆旅有新知弔古過燕市哀歌同漸離楚筵分醴後蜀肆下簾時欲就百錢卜長貧老不疑贈薛郎畫史風流數薛郎竹間茅屋對瀟湘牀頭金盡還沽酒愛學吳歈和楚狂夏日陪葛刺史胡少府呂尹汪三山人飲曹公東湖水亭竹裏逢仙尉花間隱使車圍棋臨水檻把酒看遊魚黃鳥鳴深栁青荷覆小渠物情欣自遂而我樂何如蘇州汪秀才見訪江陵草堂以詩貽之漂泊江鄉老此身柴門長閉任家貧雲霄放鶴渾間事風雨看花又一春抱玉幾年終獻楚懷書垂老莫干秦昨朝憶其接輿醉竹下狂歌見性真飲酒城上秋風見薜蘿十年江客意如何酒腸方大黃金盡世事才知白髮多月冷却憐孤鶴怨天寒誰聼飯牛歌平生還愛於陵子用拙為園老一蓑秋興二首蕉葉臨窗卷幽花向砌分楚童秋洗竹江鶴夜鳴雲地僻應增懶身潛不用文近來饒酒劵秋思更紛紛江上形容老山中薜荔秋鶴鳴竹院靜狙嘯蓽門幽愛樹收黃葉憐生洗白頭室無萊子婦誰共卧雲丘江陵送王秉之不恃金貂貴山人乃武辨之家常縣韋布情當筵一諾重却敵萬金輕慿堞哀王粲臨湘弔屈平還家留舌在少婦下機迎中秋夜月蕭蕭風露寒耿耿客衣單螢火流花砌桐隂上井闌楚雲常獨卧巴月共誰看身世何須計生涯此籜冠江陵送李梓老還蘇州十載江陵共白頭楓橋橘酒憶蘇州此生見面應稀少客淚因君灑素秋破悶暖老慿湘酒為園仗楚童風殘青豆架露滿菊花叢流水十年事浮雲一病翁逹生還自古陶令不羞窮承天寺再贈王秉之山人貧賤論交日悽悽多苦顔井寒晨炊少室靜共僧間囊裏常留藥人前笑買山飄零王逸少海上幾時還樂圃園芙蓉鴛鴦菊並開再呈呂尹二山人明月芙蓉發秋風薜荔生歌從山鬼嘯劍任奚奴擎斸地留殘藥休糧檢落英南枝有羇鳥同結越鄉情楚童白晳楚童清雙鬟挈酒瓶灌花晨汲井學字夜囊螢竹院晴時掃柴門客去扄弱軀偏惜汝飢渴屢曽經遼府草亭贈朱孔昭平原門下似君稀猶著前春舊布衣况我不如君數倍食魚何敢望輕肥春還海上因贈嘉定王山人雲度滄江冷花飛碧海春誰家無斗水涸轍有窮鱗自笑投珠客猶憐泣玉人肻邀笙鶴侣共爾覓玄津春日登荆州沙津觀音閣塔塔院收花雨樓臺散佛香山青巴國近鳥白楚天長樹色分衡嶽江流入漢陽古來爭戰地誰是水雲鄉江上逢羅鍊師因簡霞西道者老去滄洲計春來湘水深白雲松子夢芳草楚臣心搖蕩江邉興蕭條澤畔吟明霞如可掬不惜報知音家兄曾學醫於鄭邦輔别十年鄭逝矣兄至江陵因感同泣下作是詩兄弟悲遲暮燕關憶壯遊壺中仙客去肘後祕方留谷口花仍發山陽笛更愁平生多感激淚灑白雲丘重九前一日同王楊二山人飲胡將軍東郭草堂栁下尋陶令籬邉問葛疆南山足芋栗東郭此茅堂萸酒年年事菊花嵗嵗芳白頭還醉舞休笑野人狂江陵送僧還蜀煙樹寒雲楚水西殘瓢破衲獨行遲心無一事即相見千里何須嘆别離少年行少年恃意氣長醉酒家樓不倚金吾勢曽隨劇孟遊卧山學劍術歷國揖諸侯白首無人識空悲易水秋敝園夏日遣懷壓架葡萄熟巡簷竹木清搖翻葵扇小欹側籜冠輕楚俗原非怨燕歌空復情雲霞仙不就書劍老何成同楊少通宿荆南驛館孤亭明月冷踈館碧梧秋雁宿新沙岸螢飛古驛樓短歌多楚調永夜看吳鈎皎皎江關夢相縣萬里愁江陵為仙居兄賦並短引吾兄負氣沉鬱形骸土木家無擔石之儲動以自得為之主不為人所羈縻雖啜𬞞飲水而絃歌晏如也性踈非傲物懶慢竟何求身老兼多病他鄉况值秋衣冠隨楚俗飲啄且荆州好似張平子曾無兒女憂戊辰夏六月江陵大水水氣迷津樹江聲駭市居川原那辨馬黎庶幾為魚荆楚年頻異沅湘老計踈近饒浮海興東下定何如江陵草堂漫賦因憶楊少通踈闊平生事支離遲莫年鄉關朔雁外客舍楚江邉酒伴曽誰訪詩狂還自憐經過楊執戟許寄買山錢連日風雨驟生薄寒分甘哺孫賦詩自娛園𬞞時醪亦足養老江城風雨夕茅屋短長吟歷歷秋花發翛翛落葉深老慿孫暖眼客用酒寬心欲買羅含宅曾無作賦金秋日小園雨後遣懷性直難干謁時清愧賤貧江山雙草屨嵗月一綸巾秋色梧桐老晴光橘柚新寥寥宋玉宅千古閉荆榛九日即事支枕茅簷下秋風正到時菊花開較晚鴻雁故來遲棲託終何事行歌且杖藜百年非有道心迹豈無疑中秋雨晴小園夕坐老去雖耽酒秋來不費詩畦蔬新雨後茅屋晚晴時謔浪還齊語蠻歌愛楚兒明朝多釀黍好待菊花期遣懷鶴髮還齊瑟鶉衣向楚人年豐兒女瘦家逺弟兄親懶拙能堪事逢迎豈性真惟將詩送老更愛酒償貧連日淹雨閉門伏枕新晴後適有諸貴過豫茅茨沽酒以慰岑寂久雨祗宜睡朝來還閉門薄雲籠屋角旭日照籬根倚杖行猶懶堆書坐欲翻不知秋草碧綿邈待王孫雨後移竹小園漫賦童僕幾時懶家貧願一金暄寒惟短褐風雨屢長吟江濶秋生蚤城高霧隱深從來愛幽意移竹間花林贈焦秀才富貴宜年少何為長苦辛魯生原好禮郢客豈終貧琢玉功須就凌雲氣益伸明年書再上應有下機人沙津妓館送楊少通渡江南征憐君能騎馬江漢未經過宦薄蠻方逺家貧童僕多朝雲憐楚子桃扇贈韓娥萬里相思字祗應候薜蘿秋夜訪承天寺二蜀僧論禪學籜冠隨所適竹杖復行吟夜月青蓮宇秋風祇樹林根塵迷至性詩酒涴禪心不學無生法其如老病侵抱孫乞食市中何室炊紅粟誰家共緑尊頻遊雙屨敝生計一瓢存任爾呼牛馬隨豫愛犬豚絶交書未上為客老荆門叢竹洞連竹分清影接籬捲洞圓叢疏風淅淅葉密露涓涓搗藥宜晨坐拋書向午眠誰知幽僻地自有野人天對酒樂府自古推名飲而今不復疑少年當適意况我白頭時劍説非良計酒歌多妙辭丹砂不可食畢竟爾何為秋日野望是年戊辰大水聼鳥中林性看雲故國心地卑湘漢闊天逺洞庭深老馬空知道窮猿豈擇林十年書劍客寂寞到如今雨中遣悶澤國秋雲重江城暮雨寒短衣為客慣長鋏向誰彈密竹藏幽徑深松著小冠渚芹亦可薦何惜老荆蠻九日同仙居兄飲江陵草堂因憶故園諸弟客淚十年落鄉心九日縣登高巴水外望逺楚雲邉各醉黃華酒同悲鴻雁天浮骸能幾日而汝且相憐久雨小晴遣悶向壁梳頭白開門落葉黃巫山朝雨歇楚岫莫雲長竹嶼詩成後茅簷酒熟香杖藜看菊圃隨挈小壺觴宋布衣集卷三
