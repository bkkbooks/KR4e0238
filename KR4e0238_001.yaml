body:
  text: 宋布衣集卷一明宋登春撰韓孝子傳昔者吳延陵季子聘於魯入其國而説其人察其俗而知其政聞其樂而辨其德先王之道於是乎見矣苟以心觀之何今昔之有哉子自楚過衛適鄒聞有韓孝子者淸修苦節之士也以明經中嘉靖乙酉鄉舉因母老不可離於膝下以此故不仕孝子曰朝廷明制都鄙養士所以待用也吾不為之用坐受其賜於此心不安遂以某年月日食廪若干鬻田宅服物依數輸於官時人笑之以為癡母死廬於墓側朝夕負土成丘高數仞讀書明道不喜浮文跏趺坐常數月不語有子僅能應門户年七十卒於家嗚呼哀哉韓孝子天性之善如此若幸而生於昭定之世得聖人而裁之其造就豈止此哉繄曽閔之亞也其行實姑為之録以俟觀風者采焉自有太史公書之傳之天下流於後世可以厲貪夫激薄子有椑於世教多矣孝子名元仕號海鶴兖州府滋陽縣人遼小紀遼王植太祖高皇帝第十四子洪武十年生母韓妃生二年初封衛王改封遼王國於遼東廣寧城王好武力得巡邉出塞練簡士馬已而坐罪奪祿會靖難兵起渡海歸改封荆州倍加祿得支二千石尉校三百人旗軍三百人文皇即位來朝卒諡簡王子貴烚立荒淫無道廢為庶人簡王第四子貴燰立卒諡肅王子豪墭立世子恩鏋卒以世子妻妾殉葬憲宗不許肅王次子恩鑙立卒諡惠王子寵涭立卒諡恭王子致格立嘉靖三年封卒諡莊王子憲㸅立初封句容王嘉靖十八年嗣隆慶三年坐罪廢為庶人發送高墻國除子幼其母娼也今寄養楚王府無行論曰膏粱之性難正有以也夫傳曰驕奢淫泆所自邪也四者之來寵祿過也遼自首封相繼七王無大顯德今庶人㸅性鄙寡施黷貨無厭蔑宗親秩優豎自恃察慧小才謂人莫已若者輕積細過以致侮慢賢豪自陷機穽而莫之知也悲夫七世宗祧蕩覆燼滅何辜哉何辜哉萬厯三年九月初一日兖州四大景詩序兖州山東重鎮也魯周公所封之域左據海邦襁負岱宗腸胃洙泗懷挈鳬繹為荆吳孔道乃天子藩屏之地古昔睿帝哲王所自出也逮今聖裔帝胄濟濟振振而多才賢其薦紳學士猶敦尚古禮往往有良刺史來守是郡名列古志多矣由此觀之非喬嶽之精滄溟之靈焉能致之哉因繪四大景詩以紀之見一州之壯觀百代之雄圗也送遊公兵備井陘序代作遊公守兖三載無秕政朝廷擢為山西兵憲分巡畿內防守要害統理戎務獲鹿為駐節之所乃戰國趙之石邑今我腹心之地也其西則有上黨雲中九原為之右臂其東則有漁陽密雲遼海為之左腋太行雁門紫荆井陘之口此為天下之脊也若乃易水鹿泉常山滹沱之險正當京南巨衝之鎮出入吐握之門五方雜處多不軌之民自古陸梁之鄉用武之地至今引弓控弦之士氊裘狗馬之俗猶夫昔也乘釁之雄狗偷之盜或時竊發而民用不寧非明哲君子兼智仁勇之德不能以鎮之經國者以此為隱憂焉竊以公命世之才秉文武之資智足以知民物之極仁足以使三軍樂死勇足以斷疑發大計即公車所涖撫而治之有餘矣自今我皇上顧無腹心之憂乃有股肱之慶天下元元之民厥有望哉即今首夏聞公戒日飾駕旌麾北指父老垂涕相誦盛德雖牛童馬走之口亦載諸道途鮿生敬裁蕪辭聊代一錢之贈與兖州乙中橋秀才書鄙人少無檢操性褊狹實不能容物嘗因觸冒權貴脫虎之口屢矣亦不能自改多為人嗤笑以故亡匿山谷間惟與道流日親孤陋寡聞不復比為人數矣曩者以文章辱知於足下雖有過情之譽鄙人不敢自信亦不敢不加勉焉恐先犬馬之年不副足下所望也鄙人近來方知足下之義甚高事無過舉皆自衷出何橫為流言所加謗讟日興鄙人甚惑之至夜不寐既而思之若有所見也請試言之可乎吾昔聞之君子去泰去甚所以防患也鄙人常以此自警固不敢為苛禮小節以形諸人也所以者何夫太白者易汙甚亷者易毁過潔者易辱是以申生遭驪姬之難也屈原罹懷王之放也二子皆由此道以致之耳由是觀之非同明不能相照非同類不能相求非同聲不能相應人情然也物理亦然也何以見之夫南威之容天下孰不以為美而嫫母嫉之妍媸之不同也泥蟠之翼天下孰不以為神而鱣鰌侮之類之不同也高世之才獨知之行天下孰不以為賢而庸人議之不肖者非之道之不同也且夫善人夜行自保其不為盜竊不能使狗無吠已也君子謀事自保其不失忠信不能使人無疑已也此其勢之必然者也又何刺制於其心哉人有爭年以長以不辨者為勝也是故君子見其大而忘其細也操其常而任其變也嚴其已而略其人也是以栁下季遇三黜而不去管夷吾就囚虜而不辭是必有故也如使南威與嫫母坐而爭憐失其所以為美矣蛟龍與鱣鰌起而相牙失其所以為神矣哲士與臧獲數而較長失其所以為賢矣譬若隋侯之珠使之彈雀與瓦礫何異干將之劍操之割肉與庖刃何殊如是者孰不謂賤其本而貴其末哉大雅整之於身與農夫揖讓登降可乎如是者孰不謂重其所輕而輕其所重哉是故君子即物而議比德而交權時而作見可而進知難而退周旋不失其所守之節也若夫死生榮辱得失毁譽如浮雲過目瞬息而滅烏有定哉此可與足下盡言豈敢為迷俗者論也鄙人今尚良食雖不能據鞍上馬亦可以有為也足下毋以窮老而棄我請間以教之鄙人深有望於足下也敬裁書山中遙寄城府儻賜回音揮雲以待答樂陵王鳯岡書鄙人適值窮老之年逃遁山中巖居谷飲於世何望朝夕祓除其心惟以文章自娛不意足下辱惠玉聲道及往事鄙人感激充臆為之太息昔者令先王待鄙人不薄列之於賔客之中揖之於廣庭之上言聽計用自幸有國士之知當足下為子時踐石以上者即有孝聞著於藩國至於今齒踈髮落遇鄙人無異先王之日蓋聞仁不忘親誼不遺逺德之至也去仁無親廢義不立審足下既不遺疏逺之人是必不忘親矣不忘親不遺逺人孰忘遺足下哉鄙人獨宿長夜夢想容輝俯仰山中恨無晨風之翼荒具短札遙寄左右嵗杪隆寒足下當為宗祧自愛何蹻小傳何蹻者東郡人也幼習尚書舉孝亷隱居不仕以才雄自高性抗直不詭於俗家貧好著書喜黃老一時宗室貴人皆愛慕之多相迎致不就昔曾雅豫凡有論辨至今尚記憶之大抵論為文章詩賦以養氣存神為主去俗淡泊為要非聖人之言不存非三代兩漢之書不觀雖飲食起居亦與諸人異目之曰蹻以故多嗤之與豫别二十年後聞竟以餒死論曰非俊疑傑固庸人常態不足怪也至於嘉言善行沒沒無聞嗚呼太璞不毁無以為圭璋椅梓不殘無以為琴瑟斯言季世也庸詎知夫所謂淳厖之上也乎此可與淵心志道者言不可與淺學迷俗者道也何子其有也夫與濮陽李理卿連山書鄙人無行逃死山中巖棲雲卧朝夕與樵牧為伍掬泉煮茗趺坐焚香此山中活計耳昔者一遇足下於濮水之上談笑大噱引滿舉白披心寫意實無纎介不合當是之時自恨相見之晚也不意别長逺矣至於今緬然引領西望煙雲飛鳥無不繫情前嵗楊生附書通問渺無音耗殊為惘然意足下棄我如遺迹焉又肯念山中人山中人蘧廬生傳泗上公有冢嗣曰頥直其名蘧廬其號魯賢公子也自稚齒誦六經四子書及其抱子時道既通南逰荆吳東表海岱還歷稷下尋古聖賢遺迹訪問巖穴高士年三十耕牧嶧泗之陽冥仁義薄曾史探聖域窺妙門芻狗萬物蜉蝣天地不知富貴之為榮貧賤之為辱死生夀夭之為變此其所以遁世無悶而與造物同逰者也豫讀古周易至井泄不食未嘗不掩卷三致嘆古之君子沒世而名不稱者多矣豈斯人之徒歟嗟夫嗟夫書其事以遺後人之慕善者鄙人何敢與於斯文書侯生活役夫卷後初世宗皇帝四十五杞春正月即有淮徐河渠之役大起南北丁夫除餉代四十萬頒白者與焉適嵗之不易民雖藜羮藿鬻曽不滿腹被襏襫戴簦笠偫畚挶霑體塗足自春至夏罷憊勞極噓氣成雲揮汗成雨蒸而為疫毒流千里呻吟之聲遍於郊野傷而不起者甚衆河渠之功幾廢司事者憂之以書幣徴侯生等六十人給以僕馬官食各分部晝夜巡其病者往來百里之內診視凡數越月董役者記之所痊活一萬四千餘人生之功居多論曰醫之為道也大矣是以聖人不居朝廷而隱卜故曰醫乃仁術也民之司命也自黃帝臣俞跗之後邈乎無聞至春秋之世秦越人活虢太子決趙簡子七日而寤漢文時淳于意奉詔問之此見於太史公之所記載也考之上下數千年唯稱此兩人不亦難乎醫和所謂上醫醫國其次疾人較之侯生雖不放之於古亦非俚俗醫師所可比擬哉附樂陵王書不肖孤某再拜稽首奉書先生有道孤不德獲罪於天遭此閔凶苫塊之餘僻陋無聞恐不能承守宗祧有負先王付託之意日夜寒心寢食不忘思得賢者以輔之此孤之至願也孤行年四十閲人多矣孤乃今而後知先生為天下士也竊嘗聞先生高卧一丘而信義重於諸侯禮讓施及萌𨽻非道義之與雖饋之千金却而弗受先生其賢乎哉孤之所謂天下士今先生自楚不遠數千里而至敝邑此天之所以不棄先王而有意於孤也先生獨不念昔日一面之識而忘孤之涼德乎意先生必不如此恝然也孤糞除先人之敝廬擁篲以待先生先生肯舉玉趾以臨北面請益幸而教焉密邇舉大事於先王得講於長者使無失喪紀不亦幸乎孤猶當致力以奉左右而不辭也敬齎錦繡四純寶璧二雙先於文馬二駟請致於先生幸勿談笑而揮之即後遣使奉迎青山之館翠芷之幄辭猿鳥謝松筠出煙霞渡洙泗孤東向跂足而望先生如嶽降也禮儀深愧不腆另具一通不肖孤某再拜稽首奉書先生有道辭樂陵王書布衣旅人某再拜稽首奉書大王足下春也窶人之子逺道飢寒沉汙鄙俗之日久矣末路無以自拔遂至衰老築室山中足下不知僕之不肖欲置之側席以備顧問飾賔館為諸胄子矜式僕高足下之義嘗因以自裁之既無尋尺之祿又乏一藝之長乃以區區窮僻之人而求立乎高軒華冕之上應對乎多方仁義之府取容乎左右便辟之側是持方枘而加圓鑿其勢不能相合也亦明矣人孰不云足下宫中鴈鶩餘食可以飽僕也况多殘杯餘瀝亦足以飫之山人藜藿之腸豈不欲哉懼失于朵頥受者固為不祥而與者亦幾乎吝矣此僕寧負罪而不敢奉足下嚴命也至於足下惠愛之意豈敢忘之僕又因足下以思之方今白頭逰遨之士遍天下抱一藝而終身不得售者多矣足下若肯擇其可者而收之僕將南逰為足下致之又何難之有哉唯恐足下之不好耳吾友人張順齋先生此海內布衣高士亦窮而無家者今寄食于陽翟之里其才藝文行過僕百倍他日儻以姓名求見足下不惜階前盈尺之地召而進之請面試之乃知僕不妄也某再拜稽首奉書致謝以辭泗上公傳泗上公者魯靖王之後樂陵宣懿王裔子太祖高皇帝七葉孫也幼英發壯而長鬛廣顙望之若玉立説詩書重然諸好射擊劍有古豪俠風人皆壯之日與貴逰公子竒材劍客椎牛擊鮮日費數金圍碁賭酒終宴不罷平原信陵之流亞也年四十攜妻孥廬於泗水之涯因號泗上公家無遺金泊如也九子一甥登進士公自擬向平婚嫁畢無兒女之憂遂杜門謝客去華就實不入城市二十餘年其髮種種矣公嘗語人曰人夀幾何雖勳庸當世乘軒服冕轉瞬百年一秋葉耳宿有良田百畝可以供饘粥薄田六十畝可以供線麻嵗時伏臘分甘哺孫彈琴擊缶咏歌先生之風以樂其心亦足矣勳庸服冕於我何有哉人皆以公為逹生又以為得異人授導引之術云僕自束髮時講業於魯得侍燕居執杖屨而從之逰久矣因知泗上公故為泗上公傳海岱耕夫傳海岱耕夫者諱頥墊泗上公叔子也祿薄不足以給妻孥退耕於野因自謂海岱耕夫性木訥厭囂嚚被草衣褐疏食水飲晏如也日誦古文數篇及高士列傳獨喜陶徴君為人闢隙地植蘜數十本花時摘園𬞞沽時醪招友于摺故舊清言永夕祝太平天子萬年賔主慶膺祉福居常牧雞豚供父母養暑則拖杖䇿蔭茂樹抱子弄孫寒則擁敗絮高卧或數月不出户庭人莫窺其藴時飯牛商歌若出金石噫古隱君子之流也其志行不能悉舉此記其大略也泗上送吕琴士還開州序開州古趙郡與敝邑相去三百里其地多棗栗之利而民殷衆富厚慷慨之士悲歌之子接踵而出以吹竽鼓瑟擊築彈琴為樂鬪雞走犬六博踏鞠為戲其俗今昔無異也山人少學縱橫家術行逰諸侯衆矣竟無遇之者中年以操縵之技為業往來江湖間薦紳學士咸器重之適鄭王自南還從而學焉以此海內之名大著矣與豫遇於洙泗之間言及音律之學甚悉且詳杯酒為歡旬日别去賦詩以送之泗水秋風寧無悲乎寧無悲乎與桐岡謝明府書僕自結髮時逰學鄒魯之間數奉教於諸君子大有所獲唯足下為多至於顛毛盡脫豈敢忘之哉足下結駟連騎旋軫西陲不知幾何年矣自前嵗方乃一見嗟夫人生嘉會豈易得哉蓋有天數耳非人力可能勝耶僕屢聞足下斥及賤名不知僕近來困憊不能出門户自信填溝壑之日不逺矣敢辱長者置之齒牙間哉今嵗新春恭審玉體無恙僕甚喜慰既而復有所懷僕嘗謂人躋耄耋之年雖持粱齕肥服食參术亦無多補矣惟省思慮一精神斯乃養夀命之原佚老之術也足下業已察之僕徒作梗偶語耳又何足較量也雖然狂夫之言聖人擇焉足下擇之乎再答高生書僕鄙野人何敢比於人數公何念之深也豈其氣味之相似耶又何愚智之異乎僕以足下鴻漸之翼當自致於青雲之上久矣今何犖犖如是耳意白璧明珠豈終掩於塵埃哉必有識者俟其後也僕豈敢私知於足下當為國家天下自珍愛之使旋附啓辭魯宗室龍山書登春白吾子足下僕本逋亡介特也淹恤在外三十餘年險阻艱難備嘗之矣唯治古學貴文章朝夕不倦至於今髮敝齒腐竟無遇之者窮老以至此矣又誰咎哉嘗試論之懷荆山之璞握靈蛇之珠孰不以天下重寶惜之然而投之必見怒獻之必見刖此自信之不篤蓋非他人之罪也若夫翳桑之殍被裘之子耻夫尺寸之功藐視無妄之金此非矯情干譽要皆篤於自信者也去年五月棄江南之業自楚而歸至於城濮得數君子矣皆山東之雋也今年春三月過泗上來鄒嶧吾子見訪山中班荆道舊觴酒豆肉往復甚動又為之築特室治從者衣屨且使之無呼庚癸倐忽星紀屢遷嵗云暮矣僕懼懷寵之戾日夜不知所裁僕嘗私曰吾子之於豫也譬如草木若非氣味之似也焉能以及此哉某再拜奉書以辭並謝吾子龍山足下謝樂陵王攜酒見訪山中恭承大王足下不惜玉趾見訪山中開醇酎出豐膳言笑盡日復領緒論遍及國語與先秦䇿士之書析精剖微深中肯綮僕瞿然而悟忽焉而覺飛動之意漸化之機油然矣神知心喻口不能自道也麗澤之雅一至斯乎家僮持簡走謝勿罪不恭幸甚右啓大王足下與高生書僕聞諸魯人言蕙軒子義甚高有古烈士之風焉過聼謬者之語饋以醇酒一罌肥牛一肩以壯夫遇我意必將以有為也不知吾耄而且憊也苟見其貌而悅之聞其言而惡之是故君子不使人見而沮之也若夫眩人之目亂人之耳吾弗能為已矣藉使蕙軒子誠知吾耄而且憊見而不沮吾將與之面結以為歡矣雖一日特牛之享吾弗敢辭惟吾子為知已故道之以醳蕙軒子逰嶧山記鄒嶧東方名山也成祖南征時特賜玲巖侯爵載在祭典萬世不窮非秦皇漢武荒淫之祀也考之詩書傳記見於魯頌保有鳬繹在春秋時為邾子國於爾雅純石相積連屬而成山側疊傾亞竅穴逶邃大槩似纍瓜之勢其餘巖洞怪石類物之形衆矣萬厯元年癸酉三月豫與蘧廬生自兖適鄒謁孟子廟遵西南山麓而入歷小岡沿曲澗循蕪城迤東轉北有讀書洞出泉清冽盈坎而不流於此更衣膳饔復東行披荆蓁步草莽縈回紆曲而上有石橫枕崖畔狀如覆屋前軒後殺即燕子巖巖下有小洞刻石繪孔子像有記時哲薛君中離為之也巖之右孤桐在焉根盤石隙高五尋餘圍數尺許不知生於上古何代自禹分九州逮今三千餘年相傳以為舊物意大椿之類乎與蘧廬生引觴滿酌撫摩盤桓其下良久由此而之東北升於山腹之間至片石梁約有半射塊峗突怒若頽若圮睥睨絶澗其深不測目眩股栗欲退而不能及下踰百步石羣峰相環原隰沃衍草鬱茂若有廬舍人境泉流石上可以潄濯北望巨石壁立似無路可通至則側身而入陟嶺砠據石磴由清宫至仙人洞洞深數十丈下有一穴通山後而出洞上磐石可容數千人道士屋宇居洞之左蒼藤古木佳卉秀石曲有幽趣可以逰息於是采山𬞞烹雲茗掃石焚香考鐘擊磬歌碩人在澗之章日暮山紫清暉娛人霞巘煙巒燦列畫幛景與神會心與物冥山水清音比於絲竹蘧廬生欲結茅讀書矢豫有終老之志焉其次凌晨逰至廢宫基址俱存可宜卜居於此向西北以漸而高躋嶔崟履崎礒魚貫猿引乃能行至此雖獵夫樵牧弛擔釋負攀緣肋息猶懼不免其前道狹益險阻陡絶轉自山口而上兩石相抱如門過此則見白雲宫坐石上掬泉而飲有古松七株斷碑殘碣數處訪尋勒銘舊畤四望蒼然汶濟洙泗經其右龜蒙徂徠峙其左滕薛徐兖州其前岱宗梁甫聳其後四方形勝數千里如在尺寸之間夫子小魯愈亦信然又北上五華頂此最高處也中有石竇僅如甕盎匍伏蛇行方出竇外周若一畝之宫兩面峭壁下臨無地前視盈尺之路超距而過有石枰可奕在朝天泉之傍傳者曰廣成子修道處也又指紀侯墓在嶄巖之上此處雖猿狖巧捷亦不能到何得而穴之墓之有無不可考此詢方人之言也如此異迹甚衆自不暇信其梵宇琳宫雲房丹室最盛於金元興替無常弗可紀録至於幽泉祕洞亦不勝數山之去地至巔上下四十餘里縱橫倍之好竒之士雖窮年逰之而不能遍繄豫逰天下名山多矣未有若是竒而且異者內虛外通鍾靈育秀實聖賢發迹之所藏蛟龍生雲雨利民人奠社稷鄒嶧之功大矣豐其祿崇其秩不亦宜乎豫與蘧廬生每逰必問於是因識其處歸來常隱起於胸中今年三月上已日記成蘧廬生伐石命工刻於嶧陽書院約李伯承少卿逰嶧山書鄙人因讀管子書所記天下名山五千二百七十邾嶧列其一焉高雖不及龜蒙至於靈徹峗磈其勢難以名狀况乃神草靈藥又多産於此鄒魯勝槩在此一山此去大邑車馳人走不至三日而逹矣昔聞明矦常欲尋真五嶽采秀名山為引年佚老之計不然則已欲復其志舍此甚邇何逺圖哉即今獻嵗載陽蟄蘇魚陟齎糧潔榼僕夫整駕飄輕裙帶長劍涉汶陽而渡洙泗即鄒魯之鄉矣鄙人掃石山中以待大與明矦為十日之飲此天下一快事也若乃垂華藻於鳬崖遺芳躅於嶧巖後世慕其人而稱述焉載之於野史列之於篇章昔人李白之樓杜甫之臺於明矦又為三矣鄙人驥尾之附名亦不朽乎山中之靈得人而愈勝矣明矦當以此為念附李北山答宋鵝池約逰嶧山書僕自結髮談藝四十餘年所遘海內布衣能詩者不少大抵挾寸長以干人不則睥睨傲岸若無所容此常態也惟足下則不然方其至自荆州才奉咳唾即如石投水不覺入之深也故留之閲嵗覩其自奉淡然自視欿然自負迥然淡則寡嗜欲欿則虛受迥則不適俗韻百凡山人常態悉無之夫亦難得哉一且辭我曰我以布衣與縉紳頡頏非詩之故乎詩非學不足以廓之非文不足以逹之與其役役塵埃以競章句孰若養晦深巖徹墳典之為益乎余嘉其志不虞足下竟有嶧陽之行後楊生至具道足下隱居高蹈及見招逰山書不俟卒業輒歎曰有志哉山人也書記翩翩進乎藝矣初僕與足下所談者詩耳既文矣姑與之論文可乎六經之下莊騷太史所録足下之常業也非古人之糟粕乎撮其篇採其句步其矩矱學邯鄲者也操刃而得其肯綮視為止行為遲學庖丁者也君奚取焉取之得雖在里巷愈資見聞取之不得雖遁世沒齒彌增豐蔀耳往見人之學史漢者竊其隱語欺人以所不知是又不善學魯男子矣若夫逰山之約深愜豫衷初以五嶽未遍捃托方輿諸志作五嶽圖考少紓卧逰之想兹奉來教云云所謂望屠門而大嚼浸浸乎垂頥涎出也今走門人徐子升往訊芳躅逝將撫嶧陽之孤桐弔邾子之故國讀秦碑於疊嶂俯龜蒙而盤桓聲絃歌以續鄒魯之風陟絶巘以占海嶽之氣興盡一揖而返使孫登鸞嘯之音復振空谷僕得為迷途之嗣宗足矣新河縣守令題名記代作士芳不佞承乏治新河三年因閲志書內守令在國朝凡三十二員名除隋元六人恐嵗久湮沒臧否無聞考之方册循諸耆舊題其名而記之勒之於石樹於廳之左常接於目省於心警諸後為令者芳也敢不自勉乎記曰若某也寬若某也察若某也仁若某也信若某也剛若某也懦若某也諛若某也廉若某也詭若某也賄此十者方册所載耆舊所言也士芳曰寬則其政也緩其民也弛察則其政也賊其民也觖仁則其政也均其民也和信則其政也孚其民也篤剛則其政也厲其民也殘懦則其政也紊其民也迷諛則其政也枉其民也誕廉則其政也威其民也誡詭則其政也駁其民也愎賄則其政也瀆其民也驕譬若形之於影聲之於響何所頃而離之哉若乃寬而不緩察而不苛仁而不柔信而不固剛而不猛廉而不矜此六者政之經也德之符也若乃懦而紊諛而枉詭而駁賄而瀆此四者德之賊也政之蠧也芳也北鄙人兢兢然為此懼後為令者視之以為何如哉重築寧晉縣大陸澤隄祭后土文代作萬厯五年丁丑三月甲辰知寧晉縣事胡某備以犧牲禱於大陸澤后土之神曰今也農隙之候有事於隄防某端諸龜策謀之髦士詢諸耆艾必也神民洽和乃後集事因喻民以辭夫隄防之設其來尚矣易曰王公設險以守其國為之城郭以禦寇盜為之隄防以蔽漲溢為之津梁以通商旅為之關塞以禦暴客此四者自昔聖王明君之首務百執事所當經理者也稽古神禹畫九州平水土鑿砥柱導江漢疏九河為彭蠡之障墊溺原隰百姓乂康齊桓公塞九河為巨隄長防以廣田居民富國伯成數世之利漢武帝伐淇園之竹塞瓠子之口以禦河決氓賴以安逮我太祖高皇帝開國之初南修荆襄之要東壅淮汴之衝民到于今無患此又萬世之利非齊桓漢武所可比擬也由是觀之隄防之務豈細政也哉夫大陸一澤居治之東偏乃九河所匯之處一枝自南逶迤而北八枝從西蜿蜒而東適或秋霖淫雨平地水深數尺浩渺澎湃一瀉千里駛如馬兔迅如錐矢牛羊不及走雞豚不及收朝為禾黍之疇暮化為魚鱉之鄉鵠鶩之宅矣雖半米一菽無所獲寸草尺木無所采百姓闔門無所奔也奄爾室頽忽爾垣毁敝撤暴露人畜俱困於水中央矣洶洶嗷嗷四顧無告當此時人人過之目睹心動况豫獨無憂恤者乎明日之四月麥秋將屆矣農務將急矣斯功不可以已矣因循舊防苟預為計斷者續之卑者增之薄者復之缺者補之詩云救之陾陾築之登登龜曰厥卜吉哉士曰厥功序哉耆曰厥役均哉豫曰可矣神民洽矣遂乃墾土行事再敕爾衆庶勿荒勿怠以干上之誅故喻以辭神其聼之與澧州劉洞衡先生書鄙人逰天下將遍矣皇皇栖栖無所止泊雖然蓬舟所逐意不出大地之上身外之計又何足較云自澧上别後鄙人潛伏山中空谷虛壑正宜麋鹿之性雖不能飲水茹芝坐石看雲亦可以樂飢矣去嵗還鄉里拜墳墓會宗族問故舊悅親戚縱酒無厭靡知底極就木之後乃有定論因與足下道之每憶蕭寺風雪之夜與足下撥火地爐談及風雅真前無古人矣當是時適有衡嶽之遊足下以兩言教之至今刻骨不忘世路無期不知何以為報也小徒邢子雲有都下參省之役為書附往敬候南宫之選想足下聞道益深所著之書今不知幾種何由以見之和唐詩選必有挾䇿儻不惜珠玉頒賜數卷傳布下邑北鄙之音為之小變自足下倡之也上邢子願使君書僕新河鄙人也自束髮時講業於齊魯之間既而西走秦晉南歷吳越楚蜀踰漢渡洛絶河閲嶧循濮水而歸至於今三十餘年矣所過都邑聞有賢豪長者騷人墨卿大雅君子未嘗不得見也敝邑雖小介在大國之間雞聞畛接煙火相鄰民俗歌謡相同經此地者望郭門而笑聞巷言而喜者人之情也豈矯然哉僕抱末伎進謁明矦願賜遊觀之暇望見顔色而足矣况聞咳唾之音哉諺語曰匪媒而嫁者士女之醜行也無因而至於前者人莫不賤也投珠按劍之誚僕將不免矣何喋喋為之哉上餘杭周君書豫嘗客遊五湖之南三江之間遍觀風俗知其好尚男勤稼穡女勞織紝是其恆業也四民之內而少偷安冗食之人雖桑樞甕牖之子負販之兒皆有魚鱉精糈之食時或稻蟹不遺種民就海濵而漁亦無凍餒之患自漢以來稱為東南財賦甲於天下兩都相隔三千餘里一水之便萬艘銜尾而至於城下天子玉食百官餼廩戎馬需餉賴之如咽喉而無枵腹之憂天下之大本得矣自大河而北土厚水深君子尚義而有節小人朴鄙而無賴力田者寡而遊食者衆四民之外吾不知其幾也稍遇歉嵗鬻妻賣子老弱斸草根而食刳木白而炊流亡海內為臣妾者不可勝紀餓殍相枕集於道為豺狼烏鳶厭飫之富若此時也雖有稷契之政曾史之仁蔑能振之矣此好尚不同南北之辨者也若我新河居堂水之東沙鹹之地凋敝之鄉為腹裏中下之邑棗栗麥豆黍稷是其宜也糞少而且力不勤况兼水旱相仍所産尚不足以償田賦而况給其妻孥乎今年稱稔而有乏食之家冬暖無雪而有號寒之民是何故哉請思之而必得矣管子所謂倉廩實而後知禮節衣食足而後知榮辱民之無良也久矣鼠竊狗偷之徒所以接踵而出也此孰咎哉此孰咎哉嗟夫泣囚之心驅網之意吾何望也乎君侯有禦寇之功期必為朝廷倚任故告之以經濟之迹此布衣之私也非敢陳之君侯其裁之答子願書昨足下過敝邑訪尋側陋明揚幽隱鄙人不足以當之若乃數言相投一夕千古或有之矣試嘗論之作者非難而識者為難識者非難而合者尤為難也物有似是而非似非而是者所以為難也魚目混珠非海客不能識之燕石似玉非良工不能辨之海客難遭良工稀遇鄙人所以老於天下而不復見也今幸而見知於足下豈不為難哉因録雜文三十首詩十四首亦魚目燕石之類也足下其裁之正節侯列傳序代作東川劉子曰天地剛大之氣流行而無間變化而不息上運而為日月下峙而為山嶽中萃而為忠臣烈士動異而機同理一而質殊於戲於正節侯見之矣侯遇敵人之難視死如飴其義膽忠心如太山屹立而不移也况白刃豈能屈之當蘄黃城陷之日全軀保妻子之臣不可勝數以頭搶地甘為囚俘而不辭雖苟免一時之害曷不思異日俱為糞土矣豈如取令名於後世哉竊嘗見侯祠建於大江之上獲享血食數百祀雄視乎千古神攝乎百蠻自宋而元自元而逮我大明盛代無疆與天地悠久若非剛大之氣不息之機何能以臻此也乎回視偷生苟活之輩譬若九泉之與昊天也豈不萬萬哉哲也冀北一士耳曷敢議侯之烈度侯之心雖然若氣味相似千載必相感也伏讀褒忠一録未及終篇五內為之崩裂萬髮為之指冠此身恨不生在當時提一劍而臨城下親驅三軍之衆破十萬之敵食姦臣肉飲賊人血方乃為一快心臨文太息不禁澘然淚下也夫再上子願書子願足下鄙人年三十合室盡喪棄鄉里别墳墓糊口四方擔囊履屫行五萬里髮敝齒腐蹤迹遍海內矣惟江左徐夫子辨之山東李少卿能諒之嗟夫天下作者雖多無分難遇自二子之後方見足下一人後不知其誰耶牙絃曠律千古絶響矧此末藝哉古詩曰不惜歌者苦但傷知音稀斯言信乎若足下為一代騷主下禮泥塗之子鄙人生色矣况猥辱品題名施後世者乎以此論之蓋青雲之士烏可不附哉答遼王書羇旅孤臣某再拜稽首謹對大王足下辱賜臣書前奉答不悉反復推尋終日弗醳其意蓋指淮南喻大王八公擬臣也果如是乎臣為大王羞之而不取也劉安叛人也信任讒邪疏逺忠良蕩覆社稷竄死於窮荒為天下笑臣以大王之賢居明天子之世豈可同日而語哉八公小儒也阿意取容懷惠苟偷不能直言正諌陷君於不義人皆鄙之臣雖不佞幸為盛世之民亦耻為之列也足下以為首稱無乃不可乎臣有狂疾數伸喙而不敢鳴儻少寬斧鉞乃敢布於下執事臣將登箕山涉潁水揖許由攜巢父前驅卞隨後役務光紉九畹之蘭攬三江之芷采首陽之薇茹商山之芝歸而振衣於閬風之巔濯足於滄溟之波晞髮於虞淵之野左挾飛仙右抱明月遙蕩乎自得之場恣睢乎無窮之門轉徙乎不死之鄉千年萬祀大王待我於緱氏之山下視人世蟲臭鼠腥不可久處也然則以氣為車以神為馬以尻為轡逰乎六合之外託乎其無始反乎其無終藏乎其無間應乎其無方不以語顯不以默隱不以有為有不以無為無譽之而不可毁之而不及稱之而無名即之而無不見也堯舜之德湯武之功周孔之業在此而已矣臣之於大王又何如也淮南八公特鼠壤餘𬞞耳何足道哉臣之狂言不以為戮亦幸矣敢望大王聽而説之乎雖然請試繹之涇渭自分不待崇朝而見矣臣又何呶呶於其間哉某再拜稽首謹對大王足下宋布衣集卷一
