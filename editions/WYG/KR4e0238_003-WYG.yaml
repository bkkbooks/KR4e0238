body:
  text: 宋布衣集巻三明宋登春撰池中雁林卧寡儔侣振褐臨清池露彩集蕙草霜華變青滋翩彼隨陽鳥唼藻戲漣漪返顧患人指廻翔稻糧羈㝠㝠逞長羽繒繳何由施伊子敦孤性帶索終棲遲藜藿豈滿腹百年厭饑劬物嬰因住念逹生焉悵而冬夜宿郡齋空齋少物役獨夜有餘清栢子堦前落梅花笛裏生豈須山櫟壽徒結畹蘭情明日鵞池上看雲還濯纓人日寄所知落莫江村裏偏憐物候新百年長作客此日愧為人薄俗存身計殘生隨世因楚蘭漸堪把采采寄情親洞庭送徐使君投劾東歸秋來為客易沾巾又向瀟湘送逐臣煙草斷雲横楚塞夕陽落雁度江津天涯白髪無知已湖上青山有故人回首呉關空悵望何年滄海共垂綸自沙津江行舟次岳陽送徐使君漠漠晴沙江水流搴衣同上木蘭舟白蘋風起洞庭暮碧樹雲横楚塞秋羇客懐鄉何限泪孤臣去國不堪愁夕陽帆影臨空盡誰念天涯獨倚樓同句呉周秀才登岳陽樓雨中望君山作乆客知呉語高樓自楚歌青山浮水面白鳥没煙蘿仙去蒼梧逺雲生天岳多鄉闗眇何許日暮洞庭波巴陵别徐使君歸荆州邸舍日暮尋江渡凉風滿白蘋歸來應寂寞臨别更情親孤劍三秋夢扁舟萬里身著書滄海上還著舊綸巾石首阻風寄懐徐刺史别後相思夢屢真秋來誰寄短書頻孤舟風雨偏愁客萬里江湘對逐臣莊舄苦吟終適越仲宣欲賦未歸秦十年零落黄金盡一夜長歌獨愴神石首江阻風雨舟中夜坐懐荆州公八月悲風生翛翛鴻雁鳴白頭多病日黄葉此山城細雨孤帆落長江獨夜情遥傳一掬涙洒向楚臣纓自公安縣夜歸鵞池莊風雨驟至有作候雁迷寒渚昏鴉集驛亭故人江上别風雨返柴荆楚些秋能賦巴歈夜懶聽蓬窓小兒女相待一燈青九月三日方别駕攜酒殽見過因懐徐荆州客淚秋能下人情老自知塞寒鴻雁早江暖鞠華遲對酒憐呉語聞歌憶楚辭明年誰更健重把紫萸枝再送俞山人遊黄岡兼訊袁郡丞昔别在何處今看白髪新無錢愁滯客多術耻謀身錦瑟悲燕士幽蘭憶楚臣相思有書札時寄草堂人聞徐使君留滯漢陽寄贈道直謫官蚤扁舟何去遲秋深縱酒後家逺寄書時悽斷秦雲色悲凉越鳥枝漢陽江樹晚摇落對相思春日尋楊山人因過賀將軍園二首空谷春將賦幽人獨可尋風香紅藥近鳥語緑蘿深一笑緣巴調三年學楚唫童扶還杖䇿隨意步華林茅屋斜臨水石闌曲拂衣松深鶴子冷花近藥苖肥老去詩猶健春來酒不違欲尋江路去竹下有柴扉曹中丞以新詩見遺雪中書此簡答凍雀飛還去空房祗欲眠高雲斷楚塞大雪滿江天竹葉春仍緑梅花寒可憐歸來曹執法時寄短長篇江村寒食白鳥忘機乆青山吾道存興來從杖屨老去愛雞豚楊栁橋邉過桃華江上村童兒沽酒至風雨閉柴門寒食西郊望八嶺山作寒食孤村飰春山逺寺鐘登臨風候異祭掃嵗時同芳樹諸王墓浮雲舊楚宫天涯對衰鬢寂寞意無窮春日陪曺中丞飲城北莊晚至東湖草堂野望感賦芳草春初折遊絲晚正繁漁樵楊栁岸雞犬野棠村悵望荆門路悽迷楚客魂酬恩留寶劍還愛趙平原春日閒居青山歌伐木白首賦閒居鴻雁春能至梅花寒更踈繭絲從婦織菜甲教兒鋤日莫北窓下尊中幸不虚秋晚江上書懐一望家園一惘然湘雲易水共長天山中薜荔日蕭索江上芙蓉秋可憐楚些獨唫長下涙燕鴻又過記殘年黄金臺上無名字醉後還謌寶劍篇秋日登唫覽樓逺客不宜秋况登江上樓心隨胡雁没身為楚雲留漢廣饒菰米湘清聚白鷗寒砧何處發落日動鄉愁秋日聞曹中丞東湖莊堂樓初築以詩奉贈雲霞江色晚楚客意何如金散身無累才高世共踈開門聞鳥雀落日見樵漁𤣥閣還應閉白頭長著書寄嘉定徐刺史柴荆烏鵲定風葉正蕭蕭落日清江上懐人滄海遥年華隨杖屨生事寄漁樵楚客銷魂處秋來誰為招八月十四夜憶徐刺史桂華初發小堂東綠芷紅蘭别一藂翡翠屏前秋寂寞芙蓉塘外月朦朧寶書玉笈為誰隠雲錦霞箋還自封鴻雁不來秋又晚故人聞已到江東秋夜天秋鴻雁來夜寒桂華落空館復相思清飈振藂薄秋日鵞池莊與故人王惟材閒酌秋水浮田葉凉風吹稻花白衣燕客醉紅樹楚人家翡翠鳴魚筍鴛鴦立釣車鵞池堪避地與爾種胡麻江陵遇同鄉王惟材末路誰相問無家我獨親他鄉今接袂童稚昔為鄰江海飄零客風塵淪落人十年俱白首笑此夢遊身雨中呈王郎黄金臺下見君顔今日蕭條入楚關一顧那知添白髪十年何事老青山鄉愁多在煙雲外客思偏生風雨間我已無家問消息開畦種藥不須還夏日攜王惟材陪曹公飲城東湖亭漠漠林塘五月寒主人長日竹皮冠酒爐茶竈從兒理菜圃𤓰田引客看老去坐忘青瑣夢歸來囊貯紫金丹鵞池道者頻相訪笑索村醪苜蓿盤俠客賭擲賽劉琨家奴過孟賁千金不肯顧一劍為酬恩趙瑟停凰柱燕姬促象尊平生􅍁段馬羞入孟嘗門與王惟材夜坐話舊醉謌燕市笑顔紅十載離家似夢中聞説存亡重悽惻對君何必嘆飄蓬閉門庭梅横似畫籬菊綴如錢閉户琴書客翻悲草木年黄金無藥物白髪滿顱顛花徑從兒掃誰來問尚𤣥秋日待家書不至感賦此詩澤國寒風木葉稀悲謌昨夜賦無衣自添白髪年華異用盡黄金生事㣲易水似憐湘月逺燕鴻還其楚雲飛魚書錦字無消息秋草閒門又夕暉八月十四夜遊太暉觀呈忠教真人碧天高處是三清金作樓䑓玉作城白鹿僊人秋弄笛青牛道士夜吹笙驚殘鶴夢江雲冷幻出松隂海月明欲寫隂符寄幽事山中老子有書迎同郡葢子材寄示文稿作此簡答萬金散盡一身輕白首為儒掉臂行郢里誰傳春雪調楚山應繋薜蘿情自知未上干秦䇿肯信歸來感婦迎却笑文章憎命逹十年猶在魯諸生登岳陽樓呉楚江山闊巴陵水國遥江流分九𣲖山勢控三苖卉服通州里蠻方翊聖朝毎希常道泰飲啄老漁樵芳樹金井梧桐樹碧枝華葉芳月明移翠影風細吐清香共惜三春色誰憐九月霜閨中有少婦嵗嵗憶遼陽寄嘉定徐二刺史豪華猶六代勝事在呉門緑樹湖邉寺紅雲海上村桑麻常夜緝橘柚向秋繁拂袖還鄉日應憐松菊存贈廬岳僧何日别東林浮杯夢澤深雲山隨去住水月即禪心鉢潤龍將見衣殘珠未沉行蹤遍五岳留偈待知音秋日鵞池晝卧卑棲佚老日高枕物華年橘柚垂茅屋菰蒲間渚田意中人不見事外客孤眠習靜𦕈身世長唫秋水篇八月十三夜江月滿江城客愁何處生殘蛩依砌響新雁與雲平露重楸梧白天寒松桂清弟兄在萬里此夕各含情江夏舟中值元日乗舲下呉㑹寒日水増波江路魚蝦美山城橘柚多維舟燕客醉倚棹楚童謌明發漢陽去相思奈若何經彭澤縣舟次小孤山阻雨山塞分呉楚山城辨土風人􅈣澤國異春色故鄉同曉飯孤山下輕帆細雨中檣烏飛自去詩罷意無窮蕪湖沙洲阻淺草樹山頭驛雲霞江口村葦人驚虎跡舟子記潮痕欲買呉姬酒能招楚客魂長波浩無際目極更何言春日寓徐公西園笋出過闌見桃香度水聞樹深連海色洞午散江雲石上抛書卷花間數鶴羣春愁如碧草隨處亂紛紛海上寒食風雨臨寒食偏驚流浪情梅花鄉信逺芳草客愁生青眼故人少白頭世事輕還餘一尊酒東海弔田横蘇臺覽古呉王昔日好呉鈎義士三千盡列侯覇業巳隨雲北散雄圖空復水東流荒臺寂寂漁樵路故壘蕭蕭草樹秋惟有館娃宫裏曲至今謌向采菱舟夜泊長橋落日長橋外維舟竹嶼孤春潮不滿㟁江鳥下平蕪負笈終歸楚尋山且在呉自傷漂泊意深夜醉嘑盧春日飲唐山人竹園蝴蝶滿園春日晴桃花梨花飛素馨千竿萬竿何菁菁時時風雨聞秋聲淇園闊節不足數渭川緑玉難為稱爾莫斸為化龍杖虚勞萬里升天行爾莫截竹學鳯笙拘牽衆樂相和鳴飾金綴玉非本性不如抱籜全爾精高陽徒籜冠生引觴大嚼無俗情其如晉代竹林彦枕麯眠糟損性靈却怪王猷多傲世入門先問主人名雪後石徑留氷雪松門鎻薜蘿地幽身自得機息鳥常過芳草春愁少梅花客醉多竹枝辭更好還愛楚人謌賞雪侍讌應教狐白暖䝉茸當謌集上公春藏金屋裏僊隠玉壺中送酒青樓妓焚香白玉童錦屏寒不入只許隔簾攏楚中送僧還嵋山隠居半偈曾聞法虚空無住心楚雲飛錫去巴水渡杯深一室寄何處千峰獨可尋有身縁未了此别日長唫送洪都道士霞外尋真侣山中問赤松僊壇花雨凈石鼎緑苔封坐煉金光草行持九節笻聞師還舊隠何日得相從送王生西遊雪裏荆門道愁中漢水春三湘曾滯客萬里欲歸身獻賦還過楚談兵莫入秦自傷流浪乆偏惜逺遊人春辭二首南浦誰家薦綠蘋野棠又發楚山春滿城芳草􅈣和雨江燕飛來似識人廣陌青樓楊栁新鶯花時節可憐人至今漢上多遊女笑折踈麻贈所親春隂竹裏松間石徑斜春雲長遶野人家幽窓睡覺鳥聲響童子開關掃落花江陵送王惟材還趙郡湘臯􅈣草洞庭雲此地逢君又送君趙瑟悲凉那可問楚謌悽斷不堪聞遥山對酒春將暮臨水扳花日未曛顦顇形容獨歸去江樓細雨歎離羣踏青楊栁洲驊騮蹀躞上芳洲楊栁青青楚水流日暮東風摇百草不知何處是昭丘遼府贈楊山人故鄉因别乆逆旅有新知弔古過燕市哀謌同漸離楚筵分醴後蜀肆下簾時欲就百錢卜長貧老不疑贈薛郎畫史風流數薛郎竹間茅屋對瀟湘牀頭金盡還沽酒愛學呉歈和楚狂夏日陪葛刺史胡少府呂尹汪三山人飲曹公東湖水亭竹裏逢僊尉花間隠使車圍棋臨水檻把酒看㳺魚黄鳥鳴深栁青荷覆小渠物情忻自遂而我樂何如蘇州汪秀才見訪江陵草堂以詩貽之漂泊江鄉老此身柴門長閉任家貧雲霄放鶴渾閒事風雨看花又一春抱玉㡬年終獻楚懐書垂老莫干秦昨朝憶其接輿醉竹下狂謌見性真飲酒城上秋風見薜蘿十年江客意如何酒腸方大黄金盡世事纔知白髪多月冷却憐孤鶴怨天寒誰聼飯牛謌平生還愛於陵子用拙為園老一蓑秋興二首蕉葉臨窓巻幽花向砌分楚童秋洗竹江鶴夜鳴雲地僻應増嬾身潜不用文近來饒酒劵秋思更紛紛江上形容老山中薜荔秋鶴鳴竹院靜狙嘯蓽門幽愛樹収黄葉憐生洗白頭室無萊子婦誰共卧雲丘江陵送王秉之不恃金貂貴山人乃武弁之家常縣韋布情當筵一諾重却敵萬金輕慿堞哀王粲臨湘弔屈平還家留舌在少婦下機迎中秋夜月蕭蕭風露寒耿耿客衣單螢火流花砌桐隂上井闌楚雲常獨卧巴月共誰看身世何湏計生涯此籜冠江陵送李梓老還蘇州十載江陵共白頭楓橋橘酒憶蘇州此生見面應稀少客淚因君灑素秋破悶煖老慿湘酒為園仗楚童風殘青荳架露滿菊花叢流水十年事浮雲一病翁逹生還自古陶令不羞窮承天寺再贈王秉之山人貧賤論交日悽悽多苦顔井寒晨炊少室靜共僧閒囊裏常留藥人前笑買山飄零王逸少海上㡬時還樂圃園芙蓉鴛鴦菊竝開再呈呂尹二山人明月芙蓉發秋風薜荔生謌從山鬼嘯劍任奚奴擎斸地留殘藥休糧檢落英南枝有羇鳥同結越鄉情楚童白晳楚童清雙鬟挈酒瓶灌花晨汲井學字夜囊螢竹院晴時掃柴門客去扄弱軀偏惜汝饑渇屢曽經遼府草亭贈朱孔昭平原門下似君稀猶着前春舊布衣况我不如君數倍食魚何敢望輕肥春還海上因贈嘉定王山人雲度滄江冷花飛碧海春誰家無斗水涸轍有窮鱗自笑投珠客猶憐泣玉人肻邀笙鶴侣共爾覓𤣥津春日登荆州沙津觀音閣塔墖院収花雨樓臺散佛香山青巴國近鳥白楚天長樹色分衡岳江流入漢陽古來爭戰地誰是水雲鄉江上逢羅鍊師因簡霞西道者老去滄洲計春來湘水深白雲松子夢芳草楚臣心摇蕩江邉興蕭條澤畔吟明霞如可掬不惜報知音家兄曾學醫於鄭邦輔别十年鄭逝矣兄至江陵因感同泣下作是詩兄弟悲遲暮燕關憶壯遊壺中仙客去肘後秘方留谷口花仍發山陽笛更愁平生多感激淚灑白雲丘重九前一日同王楊二山人飲胡將軍東郭草堂栁下尋陶令籬邉問葛疆南山足芋栗東郭此茅堂萸酒年年事菊花嵗嵗芳白頭還醉舞休笑野人狂江陵送僧還蜀􅈣樹寒雲楚水西殘瓢破衲獨行遲心無一事即相見千里何湏嘆别離少年行少年恃意氣長醉酒家樓不倚金吾勢曽隨劇孟遊卧山學劍術歴國揖諸侯白首無人識空悲易水秋敝園夏日遣懐壓架葡萄熟廵簷竹木清摇翻葵扇小欹側籜冠輕楚俗原非怨燕謌空復情雲霞仙不就書劍老何成同楊少通宿荆南驛館孤亭明月冷踈館碧梧秋雁宿新沙㟁螢飛古驛樓短謌多楚調永夜看呉鈎皎皎江關夢相縣萬里愁江陵為仙居兄賦並短引吾兄負氣沉􅊊形骸土木家無擔石之儲動以自得為之主不為人所羈縻雖啜􅂼飲水而絃謌晏如也性踈非傲物懶慢竟何求身老兼多病他鄉况值秋衣冠隨楚俗飲啄且荆州好似張平子曾無兒女憂戊辰夏六月江陵大水水氣迷津樹江聲駭市居川原那辨馬黎庻㡬為魚荆楚年頻異沅湘老計踈近饒浮海興東下定何如江陵草堂漫賦因憶楊少通踈闊平生事支離遲莫年鄉關朔雁外客舍楚江邉酒伴曽誰訪詩狂還自憐經過楊執㦸許寄買山錢連日風雨驟生薄寒分甘哺孫賦詩自娯園􅂼時醪亦足養老江城風雨夕茅屋短長唫歴歴秋花發翛翛落葉深老慿孫暖眼客用酒寛心欲買羅含宅曾無作賦金秋日小園雨後遣懐性直難干謁時清媿賤貧江山雙草屨嵗月一綸巾秋色梧桐老晴光橘柚新寥寥宋玉宅千古閉荆榛九日即事支枕茅簷下秋風正到時菊花開較晚鴻雁故來遲棲託終何事行謌且杖藜百年非有道心跡豈無疑中秋雨晴小園夕坐老去雖躭酒秋來不費詩畦蔬新雨後茅屋晚晴時謔浪還齊語蠻謌愛楚兒明朝多釀黍好待菊花期遣懐鶴髪還齊瑟鶉衣向楚人年豐兒女瘦家逺弟兄親懶拙能堪事逢迎豈性真惟將詩送老更愛酒償貧連日淹雨閉門伏枕新晴後適有諸貴過予茅茨沽酒以慰岑寂乆雨祗宜睡朝來還閉門薄雲籠屋角旭日照籬根倚杖行猶懶堆書坐欲翻不知秋草碧綿邈待王孫雨後移竹小園漫賦童僕幾時懶家貧願一金暄寒惟短褐風雨屢長唫江濶秋生蚤城高霧隠深從來愛幽意移竹間花林贈焦秀才富貴宜年少何為長苦辛魯生原好禮郢客豈終貧琢玉功須就凌雲氣益伸明年書再上應有下機人沙津妓館送楊少通渡江南征憐君能騎馬江漢未經過宦薄蠻方逺家貧童僕多朝雲憐楚子桃扇贈韓娥萬里相思字祗應候薜蘿秋夜訪承天寺二蜀僧論禪學籜冠隨所適竹杖復行唫夜月青蓮宇秋風祇樹林根塵迷至性詩酒涴禪心不學無生法其如老病侵抱孫乞食市中何室炊紅粟誰家共緑尊頻遊雙屨敝生計一瓢存任爾呼牛馬隨予愛犬豚絶交書未上為客老荆門叢竹洞連竹分清影接籬捲洞圓叢疎風淅淅葉宻露涓涓搗藥宜晨坐抛書向午眠誰知幽僻地自有野人天對酒樂府自古推名飲而今不復疑少年當適意况我白頭時劍説非良計酒謌多妙辭丹砂不可食畢竟爾何為秋日野望是年戊辰大水聼鳥中林性看雲故國心地卑湘漢闊天逺洞庭深老馬空知道窮猨豈擇林十年書劍客寂寞到如今雨中遣悶澤國秋雲重江城暮雨寒短衣為客慣長鋏向誰彈宻竹藏幽徑深松著小冠渚芹亦可薦何惜老荆蠻九日同仙居兄飲江陵草堂因憶故園諸弟客淚十年落鄉心九日縣登高巴水外望逺楚雲邉各醉黄華酒同悲鴻雁天浮骸能㡬日而汝且相憐乆雨小晴遣悶向壁梳頭白開門落葉黄巫山朝雨歇楚岫莫雲長竹嶼詩成後茅簷酒熟香杖藜看菊圃隨挈小壺觴宋布衣集巻三
