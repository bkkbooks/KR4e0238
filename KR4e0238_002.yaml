園亭懷白石山人雲泉滿谷碧桃肥白石山人去未歸春至不知芳草緑月明松下鶴雙飛贈東隅逸人東隅老人能養拙春來釀酒摘松葉有時半醉臨風前獨抱瑶琴嘯海月登文星臺春酒百壺春日開東風扶我上文臺乾坤無處著雙眼祗對雲山舒壯懷醉中書長安酒樓黃鶴還來舞醉鄉調歌不用紫雲娘一瓢連月揮春甕大醉長安幾百場冬夜宿三清閣三首紅雲長繞玉皇家爐裏丹成結紫霞琴冷月明孤鶴怨氷壺昨夜浸梅花道人不解塵機事愛訪吹笙騎鶴仙歌罷紫芝雲外落一鈎梅月映氷絃遙看玉雪灑長天隔匣飛光寶劍寒江月山雲頻有約先生歸去著黃冠别友歸山中杖挑一束青囊書走向山中覓雲蕨何處幽人深憶君白猿霞外嘯蘿月贈方士無何老人懸玉壺揮雲笑月出蒼梧袖裏丹砂三百顆時化黃金入酒壚出門行山有雲水有瀾壯士出門彈危冠抱劍羞歌易水寒一朝笑解盤龍帶十年零落黃金鐶惟遺雙寶珠憂來不忍看願采金光草令人駐朱顔太暉觀晚眺霞月生西嶺秋雲淡暮山鳥啼仙閣近花落羽人間白髮非生事黃金豈駐顔孤懷猶未愜長嘯下松關小築杖屨秋來健山林老去偏野花踈短砌木葉滿平田雞犬夕陽盡人家橘柚連江深寒小築棲泊自年年荆州公餽酒菱葉青青水荇齊繞籬黃蝶菜苖肥夕陽誰送山人醉坐看兒童跨犢歸秋風嫋嫋熟黃梁池上鵝肥酒更香醉裏不妨學楚語竹枝歌好和漁郎八月十三夜郡樓宴集高樓落日秋冥冥西風吹送燕鴻聲半江杳靄月初上萬壑虛無雲自生拊檻欲窺白兔藥持杯空復紫芝情誰家今夜橫長笛楊栁折殘怨未平沙津送林孝亷還白下為送王孫去踟蹰芳草邉鶯啼娃妓館花拂孝亷船易醉金陵酒長歌寶劍篇相思重回首郢樹隔風煙雨中烹雞有作避地豈真隱謀生未有方晨煙熟雞黍墟里淡柴桑雨過豆花赤風高柿葉黃鄰家不相識何處覓壺觴十五夜郡齋小集校書罷藝閣移尊趂晚衙莓苔宜小簟蠟燭隱輕紗稚子能馴鴿翻階啄落花微風坐醒酒明月共分瓜宿郡齋燭盡憐紅影詩成掉白頭吳歌小榻夜楚雨虛堂秋殘夢醒餘瀝輕寒仗敝裘鮒魚甘涸轍吾亦笑莊周妓館送人還金陵楚水湘雲桂樹秋黃金未盡大刀頭西風謾薄班姬扇南浦愁看燕子樓雞塞夢回憐玉佩龍關月冷憶貂裘明年郢上還芳草夾岸桃花好泛舟江閣晚望呈荆州公幾處蒹葭連岸白數村煙火隔江明無家自合依劉表有賦誰能薦長卿巫峽去帆江樹隱衡陽歸鴈暮雲平黃金已盡還為客湘漢長歌萬古情九日集楚雄樓懷舊沱水燕關憶壯遊短衣孤劍老荆州天涯縱酒逢青眼馬上看楓掉白頭日暮飢烏還繞樹煙寒古堞自深秋江空鴻鴈無消息千里相思月滿樓集郡樓感賦客計蕭條白髮生江山去住一鷗輕山雲漠漠長含雨江草萋萋空復情楚老已忘白雪調巴童還解踏歌聲猶憐憔悴餐英者落日登樓賦未成久雨秋作田家苦黃粱夜自舂衡茅難久雨桑柘易凄風懶織從新婦荒鋤教小童詩成還獨笑天地一衰翁秋日過羅道士山房自煮胡麻飯看松閉石關緑芝眉宇古白鳥道身間劍祕屠龍術囊探伏虎丹不須擇地隱隨處是青山九月七日龍山感賦簡蘇郡丞殘日凋山葉涼雲脆渚芹空憐黃菊酒不醉白頭人秋水還堪賦高臺易愴神去來隨老馬踈散任吾真郡東廳晏坐晝刻分香短風簾簇影移天清聞墮羽院靜見遊絲往事間堪憶長貧老不疑黃金未可就瀛海竟難期宋布衣集卷二
