body:
  text: 宋布衣集卷二明宋登春撰感遇五首燧后教火食沿代利欲生佃魚爭朵頥弧矢遂為兵鴻運乃如此海波詎能平伊余抱宿性聊以淡自營眇軀混羣有乘化歸無名周道昔淪喪鳯德遽云衰所賴二三子微言諒靡隳聖代握元化人文粲葳㽔蒼麟在郊藪朱鳥翔崇榱我后貴清真垂衣詢無為廣成久已去至道當咨誰涼風從北來騷屑鳴南林流雲掩徂暉寥廓結重隂感時長太息矯首發孤吟河氷知路寒思逺知憂深亹亹行采芝悠悠念所欽神龍謝鞭䇿猛虎辭羈鞅智哉韓公子功成不受賞滅迹遊人間抱神而孤往千載獨不見令人生遐想翩翩瑶臺客穆穆孤鳯姿口誦紫霞篇手弄白蟾蜍贈我崑崙圖兼之青都書去去不可留滅影凌紫虛胡馬客胡馬鐡連錢婀娜珊瑚鞭垂冠明月珠橫劍照秋蓮笑買胡姬酒醉歌易水篇咄哉揚子雲白頭守太玄白鼻騧騕裊白鼻騧婀娜玉鞭斜錦韀明春陌銀鞍拂栁花經過劇孟飲留醉阿奴家日暮旋鳴轡長安有狹邪紫騮馬騮馬黃金羈行行赭電馳三春白日晚六郡良家兒厲劍龍庭北解鞍鐵嶺陲歸來朝玉殿猶把漢旌旗塞下曲二首金鞭白馬出蕭關沙塞黃雲五月寒明主恩深猶未報隂山何日斬樓蘭燕草初齊苜蓿肥白狼山上客思歸轅門昨夜軍書到又領殘兵度武威公子行茱茰錦帶繡芙蓉千金匕首雙蛟龍旋喚燕姬招酒伴城南蹀躞五花驄古思邉井上梧桐春作花園中苜蓿初藏鴉少婦流黃挑錦字將軍提劍戰龍沙戰城南都護輕車出上谷健兒飲馬長城窟丐奴昨日戰城南風雨蕭蕭鬼夜哭霍家奴不識何人美丈夫赤鬚碧眼霍家奴公府長揖三千石歸來調笑酒家胡欵塞曲蒲萄酒熟黃羊肥碧眼戎王夜獵歸聞説漢家李廣在分營不敢犯金微古意二首妾意如幽蘭日逺自馨香郎心如明月夜夜減清光妾心如朱絲久在箱篋底願為錦瑟絃無人解調理焦仲卿妻城南寒食女還家燕麥青青草作花使君莫漫來相問自是長安有狹斜春遊曲江南春草芳江北栁條長玉面城中女金鞍塞上裝長兄遊俠子夫壻孝亷郎夾轂休相問持手慎所防俠客南山北山射封狐白馬如飛呼韓盧日暮解鞍招酒伴腰間脫下金僕姑白鵠篇送顧五翩翩雙白鵠乃從何方來千里一返顧萬里一徘徊不見王子喬飛鳴有餘哀棲托瀟湘渚毛羽何摧頽飢乏琅玕食凡鳥長相猜願得同心侣聯翮舞瑶臺徙倚瓊樹間回首謝塵埃擬古送顧李狂遊襄陽二首青春駕言邁江蘺冒青英吳會有狂且遠託高陽生丈夫抱竒志豈同兒女行近情恐不任逺懷為物嬰南國無伯桃東海少田橫結交古道喪感激何時平白日照郊墟晨風悽中懷為子具樽酒中懷良不開翩翩孤飛鴻長鳴向我哀執手漢水上念子何時歸生當崇令德死即欣泉臺將之吳越别秦中知已寒亭嫋嫋紫蘭枝曲池兩兩鴛鴦羽鴛鴦飛去蘭池空青山一别隔千里秦娥抱瑟歌陽春金尊緑酒照離人酒清絃正苦腸斷不堪聞我有相思曲歌竟恐憂君明朝又向東吳去含情結思滿秦雲孤鶴篇贈李山人瑶臺有孤鶴逺下玉山岑厭兹惡木枝結巢珠樹林飢食青琅玕刷羽揚孤音仙人王子喬邂逅論素心攜手白雲間相知一何深解攜在斯須相憶祗鳴琴秋夜鵝池侍宴應教車馬荒村夜流螢水面多野雲停几席江月引笙歌樽湛淮南酒池添道士鵝白頭慙授簡休問賦如何薊門桑柘兵殘後人家夕照中天秋沙鴈沒月冷戍樓空選將燕山北連營易水東城南餘戰地磷火夜深紅春日野眺簡徐荆州春問沙棠楫寒生杜若洲山雲巴子國江雨仲宣樓嵗月餘華髮飄零隨白鷗誰憐能賦客劉表在荆州紀南樂應教沙市多新館章華餘舊臺細雲薰岸栁殘雪照江梅楚舞花鈿麗吳歈寶瑟催清尊宜落日作賦子雲才十二月還江陵草堂昔别草堂在重來白髮新曉窗檠自短夜雨榻猶陳猿鶴識吟客琴尊宜故人梅花還共笑不厭野夫貧村居秋夜即事二首豐草隨鳩杖長林自鶡冠竹風輕嫋嫋花露白團團秋晚雕胡飯夜涼芋栗盤兒童溫笑語來去問加餐樹密多棲鳥池深足躍魚江雲輕葛冷山月小堂虛寒竹依闌砌秋雲映石渠流螢何意思故故繞琴書新春堂成寄懷所知老去還杯酒春來自草堂揮金曽有志煮石竟無方岸水浮鸂鶒林花宿麝香故人江漢少念子意何長秋日江村寄懷顧五水白魚蝦市天青鸛鶴林露華浥細草秋氣淨遙岑子夜吳門調幽蘭楚客心相思渺何許日暮大江深鵝池留客園果風還落草蟲鳴不休竹深高閣冷花密小亭幽白幘留雲鶴青藜狎水鷗一尊同客醉不用典吳鈎瑶琴怨秋風嫋嫋石蘭長楚姬拭淚紅巾芳蒼梧帝子去不返空留瑶瑟泛瀟湘江樓對月懷鄭汝推霜楓搖落早猿啼愁對澄江送夕暉明月樓寒人不見相思千里楚雲飛過夷齊祠寄别襄垣殿下春蕨生兮依依春薇秀兮菲菲悵逺人兮煢獨慕公子兮忘歸雲揚兮南山河流兮潺湲懷王孫兮不見采薜荔兮烹蘭雲嫋嫋兮行春望帝子兮憂殷殷攬杜蘅兮河渚結荷衣兮江濆長平道中早發言懷流目古戰場白日驚飈馳蠨蛸挂虛牖寒瓜蔓枯籬玄蟬傷白露青莎被修池佳人理紈素行子心傷悲童僕嚴晨駕駕言涉丹湄羇旅寡良儔麗澤當依誰誰為黃雀吟還歌猛虎詞利劍恆在腕壯心安所期流景不可駐沉嘆將何為欲學騰化術松子久吾欺人生貴適志知命復何疑逺别離我出雪溪來梅花落湘楚湘娥忽而笑留宿鴛鴦浦鴛鴦浦寒月照沙兩情歡極生悲嗟泠泠逝水送月落夜長起坐歌蘭花留别榆關知已促駕逺行邁迢迢事東遊紉蘭思楚澤結荷憶吳洲嶇嶔遵恆麓迤邐凌燕陬所歷無停迹居然隘九州投志在道義脫劍為誰酬念子宿昔交欲去復淹留寓忠教真人山房窈窕白雲谷春芝秀幾華醉吟滄海月笑弄淥江霞丹竈開仙館瑶城輔帝家何年騎白鶴萬里覓雲槎送嘉禾張山人徴伯遊大梁芳草年年緑浮雲日日征兵戈遊子意桑柘故園情賣賦金何有著書名未成時無魏公子誰復重侯嬴宋中送客歸襄陽相送夷門道重過古驛亭南行春草緑一望晚山青鄉夢梁臺雨羊裘漢客星鹿門今可問花月正冥冥伊闕岸坼臨無地崖縣欲墮空松門雙鳥下蘿徑野泉通禹廟荒垣裏河流砥柱中樵歌起林末似覓飲牛翁春日登鈞州西臺思登洲兄晴沙初度鴈春樹早聞猿野店人煙少孤村霜露繁年華餘白髮棣蕚逺青尊故國河山北幽懷難具論戊午杪秋示義兒鯨天地羇愁客江山去住人悲涼十載事漂泊一綸巾此日知吾老他鄉獨爾親圖南未可料空負故山春鈞州除夕柏酒消寒色燈花坐夜分醉題招隱賦懶草送窮文春夢周南客鄉心冀北雲緱山有仙子吹笛靜中聞贈李棗強泉石元同調辭官幾嵗華鋤雲開藥圃看月到僧家詩敵雙峰逈門從五栁遮秋蘭自可佩何必問丹砂秋夜獨坐詠懷露灑青梧濕天寒鴻鴈鳴星雲搖海戌砧杵動山城久客三秋夢懷人獨夜情故鄉渺何許華髮嵗殘生荆州雜詩六首選勝樓居好慿高發興竒江雲春自裊山月夜相宜頭白還詞賦身間且嵗時滄洲吾道在花鳥莫深期寒渚依鳬鴈春城自薜蘿登高初擬賦望極欲悲歌落日燕京逺浮雲楚徼多一尊饒桂醑何處弔湘娥流落燕州日踈狂楚國身無金難作客多病况逢春白髮猶公道清尊不負人相逢無狗監投䇿莫干秦惆悵荆州牧新詩此見招渚花無落日岸水接平潮寒雨沾琴嶽春風試洞簫盤雲雙白鶴似欲待王喬問藥過城府兒童晚未回雲深宋玉宅雪暗楚王臺花發春猶淺樓高賦轉哀家家湘酒緑誰為一尊開水呈滄海賦山送白雲篇浩渺鵬腰客虛無鶴背仙清樽隨世計芳樹自流年閉閣吾將老何人問草玄雪夜期顧山人不至凍合漁樵路扁舟夜不來江頭寒鴈滅城上飢烏哀寥落尋仙客飄零作賦才明朝風日好花下且深杯荆南懷鄭汝推吾憶鄭交甫清狂世共癡留金為結客買劍贈相知慷慨吳公子悲歌高漸離風塵淹此日頭白欲何為送句吳豪士重遊大梁魏王臺上草紛紛落日中原低暮雲匹馬浪遊孤劍在酬恩誰説信陵君汴水東流接大河曽經帝里問銅駝春風三月旗亭酒落日夷門一放歌沙塵風起晝冥冥二月黃河尚帶氷桑柘夕陽村店路同誰走馬弔韓陵白石歌送吳允升渚宫楊栁春依依麥城宿雨朝雉飛南山白石何纍纍逺道之人胡不歸我欲念之心苦悲九日送張周二子江漢逢詩侣雲霞送酒杯鳥飛巴子國水落楚王臺寶劍知吳客瑶琴識越才昭丘誰更賦嫋嫋暮猿哀送周文美還海上與君非宿昔同病即相憐悽惻登樓賦悲涼説劍篇客懷江路永鄉夢海雲邉遲暮身何有還留貰酒錢送俞山人還漢陽落日下平原秋林白露繁獨憐長路客棲託向誰門賣賦金何有還家舌尚存劍歌空自苦江漢有芳蓀贈吳門顧季狂水落荆門晚風涼嵗欲徂且隨梁苑客好著羽陵書天地終懷玉江山未卜居何時結蘿薜同釣漢川魚書西園水亭夜合含香發春蒲出水齊年華隨短鬢客計逐幽棲山鶻窺人落江雲拂户低桃花迷處所錯認武陵溪早起臨水慙魚樂瞻雲憶所欽匣中惟寶劍世上羡黃金留滯防人面凄其損客心春來每起早蘭澤一長吟贈賣藥焦老善奕龎眉七十強高卧水雲鄉還賣修琴藥常餘養鶴糧橘中無俗著肘後有仙方我亦餐霞客金華訪牧羊再贈顧逸人吳門豪客美且都十年負劍遊嵩廬黃金百鎰俱散盡方衫皂帽行長途江陵帝子愛敬客旋遺裘馬驅騎奴花前醉草三都賦肘後常懸五嶽圖轉眼看天爾何有回頭大笑滄洲孤而今恐有聊城急還留一隻金僕姑上元夜走筆戲簡呈忠教主人蒲萄釀瑪瑙鍾小姬裙學石榴紅任教刻漏咽銅龍江陵帝子醉春風醉春風樂復樂月下行來花下酌一時枚馬俱升堂君平簾下何寂寞沙津樂二月沙津江水平吳船楚榜棹歌行高樓夾岸饒商估小妓街頭鬻唱聲贈會稽劉世儒劉生多氣岸負劍逺行遊落日三湘酒煙花七貴樓右軍白羽扇季子黑貂裘我亦淮南客因逢桂樹留贈東巖主人東巖主人東巖棲巖花開遍巖東西有時自抱一斗酒醉約山翁弄玉溪己未三月寄李逸人天涯流落客嵗暮欲何之風雪主人少山村童僕飢已敦寶劍諾誰賦白駒詩季子裘雖敝終看佩印時再送張逸人燒藥頻留火讀書只閉關半生為北客萬里一南冠潁水春來别吳山夢裏看明年又秋草張翰幾時還貽上黨程户矦擊築醉燕市躍馬佩吳鈎白玉酬歌笑黃金散故侯舉鞭辭府長揮手謝時流願斬單于首為君雪國讎少年行誰家年少羽林郎寶馬金鞭從武皇新賜腰間白羽箭尋常射殺左賢王逺遊紅顔辭舊國華髮尚羇人軒冕非吾願風塵老此身梁鴻五噫發子建七哀頻玄閣年年閉花林只舊春秋日上黨道中懷故鄉知舊白髮生青鏡黃花吐素秋家書無鴈足客路一羊裘海燕辭鄉社山猿傍酒樓誰堪回首處千里暮雲稠再示鯨客夢苦難成嗚雞又及晨燕鴻驚嵗晚越鳥對愁新九月催寒葉孤琴伴旅人相看正牢落非爾復誰親越溪女越溪素足女婉笑青眉揚泛水采芙蓉歸來衣更香山樓秋夜有所懷旅宿燕關暮天寒霜葉稀涼風生夜榻客淚下秋衣路逺鄉雲斷山深邉草肥堪悽珠樹鶴何日故林飛晚歸山寺二首月淨花林僻琴清竹院間幽蘭芳短砌獨鶴下空山鳥道排雲入松門映雪關兒童夜歸去採得紫芝還鶴懶眠白石雲深護紫芝僧間翻貝葉月冷浸蓮池鷲嶺秋尋遍虎溪夜度遲梅花伴成夢霜色淡孤帷感懷呈劉五劍騎任飄零天涯作客星年華雙白鬢秋夢一浮萍返老尋丹訣怡情誦鶴經故人劉季子相對眼能青長安僧舍種竹青門外分花杜曲邉關雲一以卧隴月幾回圓曉夢悲鄉樹秋風滿嶽蓮囊空金錯冷時誦馬蹄篇南遊别山東知已池浸芙蓉月堂含松葉煙搴衣坐